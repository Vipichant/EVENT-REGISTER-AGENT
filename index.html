<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            var currentFetch = originalFetch;
            Object.defineProperty(window, 'fetch', {
              get: function() {
                return currentFetch;
              },
              set: function(v) {
                currentFetch = v;
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn("Shim for window.fetch getter/setter failed:", e);
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
